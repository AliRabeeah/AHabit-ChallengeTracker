name: Build and Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases and uploading assets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for generating changelog

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Align Expo native dependency versions
        run: npx expo install --fix

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Get current date and version
        id: info
        run: |
          echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.info.outputs.version }}-${{ steps.info.outputs.date }}
          name: Release v${{ steps.info.outputs.version }} (${{ steps.info.outputs.date }})
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (Optional)
        uses: actions/upload-artifact@v4
        with:
          name: ahabit-apk-${{ steps.info.outputs.date }}
          path: android/app/build/outputs/apk/release/app-release.apk
